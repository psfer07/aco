<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscador de rutas de escape</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js"></script>
</head>

<body>
  <header>Simulador de encontrar la ruta óptima de escape</header>
  <br>
  <canvas id="canvas_render"></canvas>
  <br>
  <br>
  <p>Habilitar ventanas como salida</p>
  <label id="windows" class="switch">
    <input id="windows" type="checkbox" name="Change window state" checked>
    <span class="slider"></span>
  </label>
  <p>Mostrar malla</p>
  <label class="switch">
    <input id="show_grid" type="checkbox" name="Change grid view state" checked>
    <span class="slider"></span>
  </label>
  <p>Mostrar obstáculos</p>
  <label id="show_obstacles" class="switch">
    <input id="show_obstacles" type="checkbox" name="Enable or disable obstacles on the space" checked>
    <span class="slider"></span>
  </label>
  <br>
  <br>
  <button id="start">Establecer punto de partida</button>
  <button id="reset">Reiniciar simulador</button>
</body>
