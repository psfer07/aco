<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscador de rutas de escape</title>
  <link rel="stylesheet" href="styles.css">
  <script type="module" src="script.js"></script>
</head>

<body>
  <div style="display: flex">
    <div style="margin-top: 5vh">
      <h2>Parámetros numéricos</h2>
      <p>Evaporación de la feromona</p>
      <input type="number" id="rho" step="0.1" min="0" value="0.3">
      <p>Valor de alfa</p>
      <input type="number" id="alpha" step="0.1" min="0" value="2">
      <p>Valor de beta</p>
      <input type="number" id="beta" step="0.1" min="0" value="4">
      <p>Valor de heurística (feromona depositada)</p>
      <input type="number" id="deposit" step="0.1" min="0" value="2">
      <p>Número de pasos (idas y vueltas de cada hormiga)</p>
      <select id="steps">
        <option value="20">20 pasos</option>
        <option value="50">50 pasos</option>
        <option value="100">100 pasos</option>
        <option value="200">200 pasos</option>
        <option value="500">500 pasos</option>
        <option value="1000">1000 pasos</option>
      </select>
    </div>
    <div style="margin: 0 auto">
      <header>Simulador para encontrar la ruta de escape óptima</header>
      <canvas id="canvas_render"></canvas>
      <div style="margin-top: 1vh; margin-left: 22vh">
        <button id="start">Iniciar/Detener la simulación</button>
        <button class="reset" id="reset">Reiniciar simulador</button>
      </div>
    </div>
  </div>
  <br>
</body>
