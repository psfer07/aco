<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscador de rutas de escape</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js"></script>
</head>

<body>
  <div style="display: flex">
    <div style="margin-top: 20vh">
      <h2>Parámetros numéricos</h2>
      <p>Evaporación de la feromona</p>
      <input type="number" id="rho" step="0.1" min="0" value="0.1">
      <p>Valor de alfa</p>
      <input type="number" id="alpha" step="0.1" min="0" value="2">
      <p>Valor de heurística (feromona depositada)</p>
      <input type="number" id="heuristic" step="0.1" min="0" value="5">
    </div>
    <div style="margin: 0 auto">
      <header>Simulador para encontrar la ruta de escape óptima</header>
      <canvas id="canvas_render"></canvas>
      <div style="margin-top: 1vh; margin-left: 5vh;">
        <label for="ants">Cantidad de hormigas:</label>
        <span id="ants_value">10</span>
        <input type="range" id="ants" min="1" max="50" value="10">
        <button class="disabled " id="start">Establecer punto de partida</button>
        <button class="reset" id="reset">Reiniciar simulador</button>
      </div>
    </div>
  </div>
  <br>
</body>
