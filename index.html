<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACO Simulator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>

<body>
    <header>Simulador de encontrar la ruta óptima de escape</header>
    <br>
    <canvas id="aco_render"></canvas>
    <p>Cambiar estado de las ventanas</p>
    <label id="windows" class="switch">
        <input type="checkbox" name="Change window state">
        <span class="slider"></span>
      </label>
      <p>Mostrar malla</p>
      <label id="show_grid" class="switch">
        <input type="checkbox" name="Change grid view state">
        <span class="slider"></span>
      </label>
      <br>
      <br>
      <button id="start">Establecer punto de partida</button>
</body>
